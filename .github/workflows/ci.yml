name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_API: ${{ secrets.TURBO_API }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: bun run build

  lint-typecheck:
    name: Lint & Typecheck
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck -- --only

      - name: Lint
        run: bun run lint

      - name: Check exports
        run: bun run apps/outfitter/src/commands/repo.ts check exports --cwd .

      - name: Exports normalized
        run: bun run exports:check

  checks:
    name: Checks
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: bun run build

      - name: Block drift
        run: bun run apps/outfitter/src/cli.ts check --manifest-only --cwd .

      - name: Publish guardrails
        run: bun run apps/outfitter/src/cli.ts check publish-guardrails --cwd .

      - name: Changeset
        run: bun run apps/outfitter/src/commands/repo.ts check changeset --cwd .
        env:
          NO_CHANGESET: ${{ contains(github.event.pull_request.labels.*.name, 'release:none') && '1' || '0' }}

      - name: Bunup registry
        run: bun run apps/outfitter/src/commands/repo.ts check registry --cwd .

      - name: Preset versions
        run: bun run apps/outfitter/src/cli.ts check preset-versions --cwd .

      - name: Action ceremony
        run: bun run apps/outfitter/src/cli.ts check action-ceremony --cwd .

      - name: Docs sentinel
        run: bun run apps/outfitter/src/cli.ts check docs-sentinel --cwd .

      - name: Markdown links
        run: bun run apps/outfitter/src/commands/repo.ts check markdown-links --cwd .

      - name: README imports
        run: bun run apps/outfitter/src/commands/repo.ts check readme --cwd .

      - name: Boundary invocations
        run: bun run apps/outfitter/src/commands/repo.ts check boundary-invocations --cwd .

      - name: Surface map canonical
        run: bun run apps/outfitter/src/cli.ts check surface-map --cwd .

      - name: Surface map format
        run: bun run apps/outfitter/src/cli.ts check surface-map-format --cwd .

      - name: Shard coverage
        run: bun scripts/check-shard-coverage.ts .

      - name: Schema drift
        run: bun run schema:diff

      - name: Tree clean
        run: bun run apps/outfitter/src/commands/repo.ts check tree --cwd .

  # Every workspace package must appear in exactly one shard's OUTFITTER_CI_TEST_FILTER.
  # When adding a new package, update the appropriate shard below.

  test-foundation:
    name: Test (Foundation)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OUTFITTER_CI_TEST_SHARD: foundation
      OUTFITTER_CI_TEST_FILTER: "@outfitter/contracts,@outfitter/types,@outfitter/config,@outfitter/state,@outfitter/file-ops,@outfitter/presets"
      OUTFITTER_CI_TURBO_CONCURRENCY: "2"
      OUTFITTER_CI_BUN_MAX_CONCURRENCY: "4"
      OUTFITTER_CI_TURBO_LOG_ORDER: "stream"
      OUTFITTER_CI_TURBO_OUTPUT_LOGS: "errors-only"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: bun run build

      - name: Test
        run: bash scripts/ci-test-oom-retry.sh

      - name: Tree clean
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-foundation-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .outfitter/reports/ci/**
            .turbo/runs/*.json

  test-runtime:
    name: Test (Runtime)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OUTFITTER_CI_TEST_SHARD: runtime
      OUTFITTER_CI_TEST_FILTER: "@outfitter/cli,@outfitter/mcp,@outfitter/tui,@outfitter/logging,@outfitter/index,@outfitter/daemon,@outfitter/schema"
      OUTFITTER_CI_TURBO_CONCURRENCY: "2"
      OUTFITTER_CI_BUN_MAX_CONCURRENCY: "4"
      OUTFITTER_CI_TURBO_LOG_ORDER: "stream"
      OUTFITTER_CI_TURBO_OUTPUT_LOGS: "errors-only"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: bun run build

      - name: Test
        run: bash scripts/ci-test-oom-retry.sh

      - name: Tree clean
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-runtime-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .outfitter/reports/ci/**
            .turbo/runs/*.json

  test-tooling:
    name: Test (Tooling)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OUTFITTER_CI_TEST_SHARD: tooling
      OUTFITTER_CI_TEST_FILTER: "@outfitter/tooling,@outfitter/oxlint-plugin,@outfitter/docs,@outfitter/testing"
      OUTFITTER_CI_TURBO_CONCURRENCY: "2"
      OUTFITTER_CI_BUN_MAX_CONCURRENCY: "4"
      OUTFITTER_CI_TURBO_LOG_ORDER: "stream"
      OUTFITTER_CI_TURBO_OUTPUT_LOGS: "errors-only"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: bun run build

      - name: Test
        run: bash scripts/ci-test-oom-retry.sh

      - name: Tree clean
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-tooling-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .outfitter/reports/ci/**
            .turbo/runs/*.json

  test-app:
    name: Test (App)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OUTFITTER_CI_TEST_SHARD: app
      # Unscoped names match the "name" field in each package.json
      OUTFITTER_CI_TEST_FILTER: "outfitter,outfitter-cli-demo,@outfitter/reference"
      OUTFITTER_CI_TURBO_CONCURRENCY: "2"
      OUTFITTER_CI_BUN_MAX_CONCURRENCY: "4"
      OUTFITTER_CI_TURBO_LOG_ORDER: "stream"
      OUTFITTER_CI_TURBO_OUTPUT_LOGS: "errors-only"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: bun run build

      - name: Test
        run: bash scripts/ci-test-oom-retry.sh

      - name: Tree clean
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-app-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .outfitter/reports/ci/**
            .turbo/runs/*.json

  ci-summary:
    name: CI Summary
    if: always()
    needs:
      [
        build,
        lint-typecheck,
        checks,
        test-foundation,
        test-runtime,
        test-tooling,
        test-app,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | \`${{ needs.build.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint & Typecheck | \`${{ needs.lint-typecheck.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Checks | \`${{ needs.checks.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test (Foundation) | \`${{ needs.test-foundation.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test (Runtime) | \`${{ needs.test-runtime.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test (Tooling) | \`${{ needs.test-tooling.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test (App) | \`${{ needs.test-app.result }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Check for failures
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
